name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege default token (#270 §3.1 — Token-Permissions). This job only
# reads the repo, installs deps, and runs tests/lint; no write scope needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Action refs SHA-pinned (#270 §3.2 — Pinned-Dependencies).
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          if [ -f test.sh ]; then bash test.sh; elif [ -f tests/run_tests.sh ]; then bash tests/run_tests.sh; else echo "No tests found."; fi
      - name: Lint Markdown files
        run: |
          if command -v markdownlint > /dev/null; then markdownlint '**/*.md'; else echo 'markdownlint not installed'; fi
